services:
  catflix-db:
    image: postgres:16-alpine
    container_name: CatFlixDB
    restart: unless-stopped
    environment:
      - POSTGRES_DB=CatFlixDB
      - POSTGRES_USER=catflix
      - POSTGRES_PASSWORD=${PGPASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - catflix_db_data:/var/lib/postgresql/data
    networks:
      - catflix-net

volumes:
  catflix_db_data:
    name: catflix_db_data

networks:
  catflix-net:
    external: true
