services:
  catflix-db:
    image: postgres:16-alpine
    container_name: CatFlixDB
    environment:
      - POSTGRES_DB=${PGDATABASE:-CatFlixDB}
      - POSTGRES_USER=${PGUSER:-catflix}
      - POSTGRES_PASSWORD=${PGPASSWORD:-catflix}
    volumes:
      - catflix_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PGPORT:-5434}:5432"
    restart: unless-stopped
    networks:
      - catflix-net

  catflix-app:
    build: .
    container_name: CatFlixApp
    image: catflix-app:latest
    env_file:
      - .env
    environment:
      - PORT=3004
      - HLS_ENABLE_TRANSCODER=0
      - PGHOST=catflix-db
      - PGPORT=5432
      - PGUSER=catflix
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=CatFlixDB
      - MEDIA_DIR_CONTAINER=/media
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
    volumes:
      - "${MEDIA_MOUNT_SOURCE}:/media:rw,rslave"
    restart: unless-stopped
    networks:
      - catflix-net

  catflix-encoder:
    build: .
    container_name: CatFlixEncoder
    image: catflix-encoder:latest
    env_file:
      - .env
    environment:
      - HLS_ENABLE_TRANSCODER=1
      - PGHOST=catflix-db
      - PGPORT=5432
      - PGUSER=catflix
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=CatFlixDB
      - MEDIA_DIR_CONTAINER=/media
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - CATFLIX_NOTIFY_URL=${CATFLIX_NOTIFY_URL:-http://catflix-app:3004/api/media/notify}
    volumes:
      - "${MEDIA_MOUNT_SOURCE}:/media:rw,rslave"
    command: ["node", "../catflix_encoding/index.js"]
    restart: unless-stopped
    networks:
      - catflix-net

  catflix-subtitles:
    build: ./catflix_subtitles
    container_name: CatFlixSubtitles
    image: catflix-subtitles:latest
    env_file:
      - .env
    environment:
      - PORT=3006
      - PGHOST=catflix-db
      - PGPORT=5432
      - PGUSER=catflix
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=CatFlixDB
      - MEDIA_DIR_CONTAINER=/media
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      - "${MEDIA_MOUNT_SOURCE}:/media:rw,rslave"
      - "./catflix_subtitles/subtitles:/app/subtitles"
    restart: unless-stopped
    networks:
      - catflix-net

volumes:
  catflix_db_data:
    name: catflix_db_data

networks:
  catflix-net:
    external: true
